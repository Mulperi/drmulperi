[audio]
sample_rate = 48000
duplex = on

[sequencer]
default_kit = defaultkit
follow_song = on
default_step_count = 16

[ui]
color_primary = cyan
color_text = white
color_playhead = green
color_accent = yellow
color_divider = blue
color_record = red
color_meter = green
color_selection_fg = white
color_selection_bg = red
color_tertiary = yellow
text_bold = off
text_uppercase = off

