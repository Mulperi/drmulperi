[audio]
sample_rate = 48000
duplex = on

[sequencer]
default_kit = defaultkit
follow_song = on
default_step_count = 16
max_step_count = 16
default_pattern_count = 1
track_shift_step_ms = 5

[ui]
# Outer frame, top menu titles, and prompt/status line.
color_primary = blue
# Main body text, normal labels, dialog text, and muted/dimmed text base color.
color_text = white
# Playhead marker, active song/chain state, 
# Accent track, hint markers, and other accent emphasis.
color_accent = green
# Reserved for divider styling; currently not visible inside the work area.
color_divider = blue
# Record state, record menu highlight, armed actions, and hot meter segment.
color_record = red
# Input meter fill color.
color_meter = green
# Selected cell/menu foreground color.
color_selection_fg = white
# Selected cell/menu background color.
color_selection_bg = red
# Mode texts like midi out, patterns, song.
color_tertiary = magenta
text_bold = off
text_uppercase = off
# Input meter in Record dialog (works while dialog is open and transport is stopped).
rec_input_metering = on
# Sort Audio view rows by track mode (pattern tracks first, song tracks after).
sort_audio_tracks_by_type = offgit
# Wider spacing between sequencer columns and parameter cells.
seq_grid_wide = on
# Draw end-of-pattern divider marker in sequencer playhead lane.
playhead_divider = off
# Render sequencer steps beyond current pattern length (if off, hidden instead of dimmed).
show_steps_outside_pattern = off
# Use larger filled block glyph in sequencer blocks mode.
large_blocks = on
# Pattern humanize amount used when HUMAN toggle is ON (0-100).
humanize_amount = 50
# Dim background when dialogs are open.
dim_overlay_enabled = on

[export]
# EQ low shelf frequency (Hz)
eq_low_freq = 40
# EQ low shelf gain (-24 to +24 dB)
eq_low_gain = 2
# EQ high shelf frequency (Hz)
eq_high_freq = 9000
# EQ high shelf gain (-24 to +24 dB)
eq_high_gain = 5

[keys]
file_menu = F
edit_menu = e
record_menu = R
tab_1 = F1
tab_2 = F2
tab_3 = F3
tab_4 = F4
tab_5 = F5
tab_next = d
tab_previous = a
sample_preview = p
dialog_patterns = t
mode_toggle = v
clear_pattern = N
pattern_copy = t
pattern_paste = y
mute_row = M
tempo_inc = U
tempo_dec = J
chain_toggle = G
chain_edit = C
pattern_length_dec = CODE:-1
pattern_length_inc = CODE:-1
pattern_export = CODE:-1
pattern_load = L
kit_load = K
pattern_prev = Q
pattern_next = W
pattern_1 = CODE:-1
pattern_2 = CODE:-1
pattern_3 = CODE:-1
pattern_4 = R

